# ============================================================================
# Physical AI Robot — local / staging stack
#   api   : FastAPI "Robot Brain" (applies migrations then serves)
#   db    : PostgreSQL 16 (durable state: robots, missions, tasks, logs, memory)
#   redis : hot state (current behavior, mission, last frame metadata)
# ============================================================================
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot
      POSTGRES_DB: robotbrain
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d robotbrain"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://robot:robot@db:5432/robotbrain
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_JSON: ${LOG_JSON:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8011:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apply DB migrations, then start the server. Keeps schema in lockstep with code.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

volumes:
  pgdata:
  redisdata:
